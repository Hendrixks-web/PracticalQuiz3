<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>3D Solar System</title>
  <script src="script/aframe.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Courier New', monospace; overflow: hidden; }

    #hud {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,15,0.82);
      border: 1px solid rgba(120,200,255,0.25);
      border-radius: 14px;
      padding: 9px 28px;
      color: #90caf9; font-size: 12.5px; letter-spacing: .09em;
      pointer-events: none; white-space: nowrap;
    }
    #hud span { color: #fff; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>
<!-- ════════════════ A-FRAME SCENE ════════════════ -->
<a-scene
  renderer="antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  background="color: #000005">
  
  <a-assets timeout="30000">
    <img id="tex-stars"       src="texture/2k_stars_milky_way.jpg">
    <img id="tex-sun"         src="texture/2k_sun.jpg">
    <img id="tex-mercury"     src="texture/2k_mercury.jpg">
    <img id="tex-venus"       src="texture/2k_venus_atmosphere.jpg">
    <img id="tex-earth"       src="texture/2k_earth_daymap.jpg">
    <img id="tex-moon"        src="texture/2k_moon.jpg">
    <img id="tex-mars"        src="texture/2k_mars.jpg">
    <img id="tex-jupiter"     src="texture/2k_jupiter.jpg">
    <img id="tex-saturn"      src="texture/2k_saturn.jpg">
    <img id="tex-saturn-ring" src="texture/2k_saturn_ring_alpha.png">
    <img id="tex-uranus"      src="texture/2k_uranus.jpg">
    <img id="tex-neptune"     src="texture/2k_neptune.jpg">
  </a-assets>

  <!-- ── Camera ── -->
  <a-entity camera look-controls wasd-controls="acceleration: 30" position="0 10 60">
    <a-entity
      cursor="fuse: false"
      raycaster="objects: .clickable; far: 300"
      position="0 0 -1"
      geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.016"
      material="color: white; shader: flat; opacity: 0.6">
    </a-entity>
  </a-entity>

  <!-- ── Milky Way Sky ── -->
  <a-sky src="#tex-stars" rotation="0 -90 0" radius="400"></a-sky>

  <!-- ── Lighting ── -->
  <a-light type="point"   position="0 0 0" color="#FFF5E0" intensity="3.5" distance="400" decay="1"></a-light>
  <a-light type="ambient" color="#222244"  intensity="0.8"></a-light>

  <!-- ════ SUN ════ -->
  <a-sphere id="sun"
    position="0 0 0" radius="3.2"
    material="src: #tex-sun; emissive: #FF5500; emissiveIntensity: 0.9; shader: standard"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
  </a-sphere>
  
  <!-- Sun glow halos -->
  <a-sphere position="0 0 0" radius="3.6"
    material="color: #FF6600; opacity: 0.10; transparent: true; side: back; shader: flat">
  </a-sphere>
  <a-sphere position="0 0 0" radius="4.1"
    material="color: #FF3300; opacity: 0.05; transparent: true; side: back; shader: flat">
  </a-sphere>

  <!-- ════ ORBIT RINGS ════ -->
  <a-torus radius="6"   tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="90"></a-torus>
  <a-torus radius="9.5" tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="110"></a-torus>
  <a-torus radius="13"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="130"></a-torus>
  <a-torus radius="17"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="140"></a-torus>
  <a-torus radius="23"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="160"></a-torus>
  <a-torus radius="30"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="170"></a-torus>
  <a-torus radius="37"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="180"></a-torus>
  <a-torus radius="43"  tube="0.012" rotation="-90 0 0" material="color:#fff; opacity:0.07; transparent:true; shader:flat" segments-tubular="190"></a-torus>

  <!-- ════ MERCURY ════ -->
  <a-entity id="p-mercury"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
    <a-sphere class="clickable"
      position="6 0 0" radius="0.22"
      material="src: #tex-mercury; roughness: 0.9; metalness: 0.05"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
    </a-sphere>
  </a-entity>

  <!-- ════ VENUS ════ -->
  <a-entity id="p-venus"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
    <a-sphere class="clickable"
      position="9.5 0 0" radius="0.50"
      material="src: #tex-venus; roughness: 0.7"
      animation="property: rotation; to: 0 -360 0; loop: true; dur: 8000; easing: linear">
    </a-sphere>
  </a-entity>

  <!-- ════ EARTH + MOON ════ -->
  <a-entity id="p-earth"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">

    <a-sphere class="clickable"
      data-name="Earth"
      position="13 0 0" radius="0.55"
      material="src: #tex-earth; roughness: 0.6; metalness: 0.05"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
    </a-sphere>

    <!-- Moon orbiting Earth -->
    <a-entity position="13 0 0"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 2700; easing: linear">
      <a-sphere class="clickable"
        position="1.1 0 0" radius="0.14"
        material="src: #tex-moon; roughness: 1.0">
      </a-sphere>
    </a-entity>
  </a-entity>

  <!-- ════ MARS ════ -->
  <a-entity id="p-mars"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 18800; easing: linear">
    <a-sphere class="clickable"
      position="17 0 0" radius="0.35"
      material="src: #tex-mars; roughness: 0.95"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
    </a-sphere>
  </a-entity>

  <!-- ════ JUPITER ════ -->
  <a-entity id="p-jupiter"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 44000; easing: linear">
    <a-sphere class="clickable"
      position="23 0 0" radius="1.3"
      material="src: #tex-jupiter; roughness: 0.55"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 1700; easing: linear">
    </a-sphere>
  </a-entity>

  <!-- ════ SATURN + RINGS ════ -->
  <a-entity id="p-saturn"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 70000; easing: linear">

    <a-sphere class="clickable"
      position="30 0 0" radius="1.0"
      material="src: #tex-saturn; roughness: 0.65"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 1900; easing: linear">
    </a-sphere>

    <!-- Inner ring -->
    <a-entity position="30 0 0" rotation="75 0 0">
      <a-torus radius="1.85" tube="0.40"
        material="src: #tex-saturn-ring; opacity: 0.75; transparent: true; side: double; alphaTest: 0.02"
        segments-tubular="6">
      </a-torus>
    </a-entity>

    <!-- Outer ring -->
    <a-entity position="30 0 0" rotation="75 0 0">
      <a-torus radius="2.45" tube="0.22"
        material="src: #tex-saturn-ring; opacity: 0.40; transparent: true; side: double; alphaTest: 0.02"
        segments-tubular="6">
      </a-torus>
    </a-entity>

  </a-entity>

  <!-- ════ URANUS ════ -->
  <a-entity id="p-uranus"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 140000; easing: linear">
    <a-sphere class="clickable"
      position="37 0 0" radius="0.75"
      material="src: #tex-uranus; roughness: 0.5; metalness: 0.1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
    </a-sphere>
  </a-entity>

  <!-- ════ NEPTUNE ════ -->
  <a-entity id="p-neptune"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 220000; easing: linear">
    <a-sphere class="clickable"
      position="43 0 0" radius="0.70"
      material="src: #tex-neptune; roughness: 0.45; metalness: 0.1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 2100; easing: linear">
    </a-sphere>
  </a-entity>

</a-scene>

<!-- ════════════════ SCRIPTS ════════════════ -->
<script>
  document.querySelectorAll('.clickable').forEach(function(el) {
    el.addEventListener('click', function() {
      var name = el.getAttribute('data-name');
      var info = el.getAttribute('data-info');
      if (!name) return;
      ttName.textContent = name;
      ttInfo.textContent = info;
      tooltip.style.display = 'block';
      clearTimeout(ttTimer);
      ttTimer = setTimeout(function() {
        tooltip.style.display = 'none';
      }, 5000);
    });
  });
</script>

</body>
</html>
